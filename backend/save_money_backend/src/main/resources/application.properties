spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_save_money}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:rootpassword}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
#------ Create new tables automatically from entities ------#
#spring.jpa.hibernate.ddl-auto=create
#------ Updates the tables automatically from entities ------#
spring.jpa.hibernate.ddl-auto=update
logging.level.org.hibernate.SQL=debug
#------ Run import.sql on startup ------#
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
